<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>予約編集</title>
</head>
<body>

<h2>予約編集</h2>

イベントID：<input type="text" id="eid"><br><br>
日付：<input type="date" id="date"><br><br>
開始：<input type="time" id="start"><br><br>
終了：<input type="time" id="end"><br><br>

<button onclick="edit()">更新する</button>

<script>
const API_BASE = "https://fastapi-reserve.onrender.com";

async function edit() {
    const payload = {
        event_id: document.getElementById("eid").value,
        date: document.getElementById("date").value,
        start_time: document.getElementById("start").value,
        end_time: document.getElementById("end").value
    };

    const resp = await fetch(`${API_BASE}/edit`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const data = await resp.json();

    if (!resp.ok) {
        alert("エラー: " + data.detail);
        return;
    }

    alert("更新しました");
}
</script>

</body>
</html>
