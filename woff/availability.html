<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>空き状況</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  .slot { padding: 8px; border-bottom: 1px solid #ccc; }
  .busy { background: #ffdddd; }
</style>
</head>
<body>

<h2>空き状況</h2>

<input type="date" id="datePicker">
<button onclick="load()">表示</button>

<div id="result"></div>

<script>
const API_BASE = "https://fastapi-reserve.onrender.com";

async function load() {
    const dateStr = document.getElementById("datePicker").value;
    if (!dateStr) return alert("日付を選択してください");

    const url = `${API_BASE}/availability?target_date=${dateStr}`;
    const resp = await fetch(url);
    const data = await resp.json();

    const box = document.getElementById("result");
    box.innerHTML = "";

    if (data.length === 0) {
        box.innerHTML = "<p>予約はありません</p>";
        return;
    }

    data.forEach(item => {
        const div = document.createElement("div");
        div.className = "slot busy";
        div.textContent = `${item.start} - ${item.end}`;
        box.appendChild(div);
    });
}
</script>

</body>
</html>
